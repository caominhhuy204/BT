services:
  mysql:
    image: mysql:8.4
    container_name: caominhhuy-mysql
    environment:
      MYSQL_DATABASE: caominhhuydb
      MYSQL_ROOT_PASSWORD: 123456
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  app:
    container_name: caominhhuy-app
    build:
      context: .
      dockerfile: Dockerfile
    image: minhhuyy/caominhhuy:latest
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/caominhhuydb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  mysql_data:
